kind = "slides"
previewPath = "/signal-terminal-deck/"
title = "Signal Terminal — Презентация"
version = "1.0.0"
id = "artifacts/signal-terminal-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/signal-terminal-deck/" ]
localPort = 23289

[services.development]
run = "pnpm --filter @workspace/signal-terminal-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signal-terminal-deck", "run", "build" ]
publicDir = "artifacts/signal-terminal-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23289"
BASE_PATH = "/signal-terminal-deck/"
